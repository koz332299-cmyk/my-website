<style>
body {
  margin: 0;

}

#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.form-container {
  position: relative;
  z-index: 10;
  width: 90%;
  max-width: 350px;
  margin: auto;
  margin-top: 150px;
  background: rgba(40, 40, 40, 0.95); /* رصاصي غامق */
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  backdrop-filter: blur(10px);
  color: white;
}
</style>

</head>
<body>

<div id="bg"></div>

<div class="form-container">
  <h2>تسجيل دخول</h2>
  <input id="email" type="text" placeholder="اسم المستخدم"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>
<button id="loginBtn" type="button">دخول</button>
</a>

</div>

<!-- الخلفية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>


<script>
VANTA.FOG({
  el: "#bg",
  highlightColor: 0xffffff,
  midtoneColor: 0xaaaaaa,
  lowlightColor: 0x000000,
  baseColor: 0x000000
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("login-btn");

  if (!btn) {
    console.log("الزر مو موجود أو الـ ID غلط");
    return;
  }

  btn.addEventListener("click", function () {
    window.location.href = "index.html";
  });

});
</script>
<!--serfr-->

<script type="module">
import { signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// زر تسجيل الدخول
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(window.auth, email, password);

 // 🔥 إذا نجح الدخول يروح للرئيسية
    window.location.href = "index.html";

  } catch (error) {
    alert("خطأ: " + error.message);
  }

});
</script>
