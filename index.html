<canvas id="shader-canvas"></canvas>

<script id="fragShader" type="x-shader/x-fragment">
precision highp float;

uniform vec2 iResolution;
uniform float iTime;

vec3 hash( vec3 p ) {
  p = vec3( dot(p,vec3(127.1,311.7, 74.7)),
            dot(p,vec3(269.5,183.3,246.1)),
            dot(p,vec3(113.5,271.9,124.6)));
  return -1.0 + 2.0*fract(sin(p)*43758.5453123);
}

float noise( in vec3 p ) {
  vec3 i = floor( p );
  vec3 f = fract( p );
  vec3 u = f*f*(3.0-2.0*f);
  return mix( mix( mix( dot( hash( i + vec3(0.0,0.0,0.0) ), f - vec3(0.0,0.0,0.0) ),
                      dot( hash( i + vec3(1.0,0.0,0.0) ), f - vec3(1.0,0.0,0.0) ), u.x),
                 mix( dot( hash( i + vec3(0.0,1.0,0.0) ), f - vec3(0.0,1.0,0.0) ),
                      dot( hash( i + vec3(1.0,1.0,0.0) ), f - vec3(1.0,1.0,0.0) ), u.x), u.y),
            mix( mix( dot( hash( i + vec3(0.0,0.0,1.0) ), f - vec3(0.0,0.0,1.0) ),
                      dot( hash( i + vec3(1.0,0.0,1.0) ), f - vec3(1.0,0.0,1.0) ), u.x),
                 mix( dot( hash( i + vec3(0.0,1.0,1.0) ), f - vec3(0.0,1.0,1.0) ),
                      dot( hash( i + vec3(1.0,1.0,1.0) ), f - vec3(1.0,1.0,1.0) ), u.x), u.y), u.z );
}

void main() {
  vec2 uv = gl_FragCoord.xy / iResolution.xy;
  vec3 stars_direction = normalize(vec3(uv * 2.0 - 1.0, 1.0));
  float stars_threshold = 4.0;
  float stars_exposure = 1400.0;
  float stars = pow(clamp(noise(stars_direction * 200.0), 0.0, 1.0), stars_threshold) * stars_exposure;
  stars *= mix(1.0, 2.4, noise(stars_direction * 100.0 + vec3(iTime)));
  gl_FragColor = vec4(vec3(stars),1.0);
}
</script>

<script type="module">
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

window.addEventListener("DOMContentLoaded", () => {

  const authButtons = document.querySelector(".auth-buttons");

  // 🔥 أزرار الصح في الجدول (إذا موجودة)
  const checkButtons = document.querySelectorAll(".checkBtn");

  onAuthStateChanged(window.auth, (user) => {

    const isAdmin = user && user.email === "admin@gmail.com";

    if (user) {
      console.log("LOGGED IN:", user.email);

      if (authButtons) {
        authButtons.style.display = "none";
      }

      // 👑 التحكم بالأزرار (فقط للأدمن)
      checkButtons.forEach(btn => {
        btn.addEventListener("click", () => {

          if (!isAdmin) {
            alert("❌ فقط الأدمن يقدر يضغط");
            return;
          }

          btn.innerText = "✔ تم";
          btn.disabled = true;

        });
      });

    } else {

      if (authButtons) {
        authButtons.style.display = "block";
      }

    }

  });

});
</script>
