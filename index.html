<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قطة الاستراحة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- تسجيل الدخول -->
  <div id="authBox" class="card">
    <h2>قطة الاستراحة</h2>

    <input type="text" id="email" placeholder="الإيميل">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="login()">تسجيل دخول</button>
    <button onclick="showRegister()">تسجيل جديد</button>
  </div>

  <!-- تسجيل جديد -->
  <div id="registerBox" class="card hidden">
    <h2>تسجيل جديد</h2>

    <input type="text" id="name" placeholder="الاسم">
    <input type="text" id="newEmail" placeholder="الإيميل">
    <input type="password" id="newPassword" placeholder="كلمة المرور">

    <button onclick="register()">إنشاء حساب</button>
    <button onclick="showLogin()">رجوع</button>
  </div>

  <!-- التطبيق -->
  <div id="mainApp" class="hidden">
    <h1>قطة الاستراحة</h1>
    <button class="logout" onclick="logout()">تسجيل خروج</button>

    <table>
      <thead>
        <tr id="monthsRow">
          <th>الاسم</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <p class="footer">المصمم ابو ماضي</p>
  </div>

</div>
