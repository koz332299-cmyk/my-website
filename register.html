<h2>تسجيل جديد</h2>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* الخلفية */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* الفورم */
.form-container {
  position: relative;
  z-index: 10;
  width: 300px;
  margin: auto;
  margin-top: 150px;
  background: rgba(40, 40, 40, 0.95); /* رصاصي غامق */
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  backdrop-filter: blur(10px);
  color: white;
}


.form-container input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

.form-container button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: white;
  cursor: pointer;
}
</style>

</head>
<body>

<!-- الخلفية -->
<div id="bg"></div>

<!-- الفورم -->
<div class="form-container">
  <h2>تسجيل جديد</h2>
  <input type="text" placeholder="الاسم">
  <input type="email" placeholder="الإيميل">
  <input type="password" placeholder="كلمة المرور">
  <button>تسجيل</button>
</div>

<!-- مكتبات الخلفية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<!-- تشغيل الخلفية -->
<script>
VANTA.FOG({
  el: "#bg",
  highlightColor: 0xffffff,
  midtoneColor: 0xaaaaaa,
  lowlightColor: 0x000000,
  baseColor: 0x000000,
  blurFactor: 0.8,
  speed: 0.8
});
</script>

</body>
</html>
