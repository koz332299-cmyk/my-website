<h2>تسجيل جديد</h2>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* الخلفية */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* الفورم */
.form-container {
  position: relative;
  z-index: 10;
  width: 90%;
  max-width: 350px;
  margin: auto;
  margin-top: 150px;
  background: rgba(40, 40, 40, 0.95); /* رصاصي غامق */
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  backdrop-filter: blur(10px);
  color: white;
}


.form-container input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

.form-container button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: white;
  cursor: pointer;
}
</style>

</head>
<body>

<!-- الخلفية -->
<div id="bg"></div>

<!-- الفورم -->
<div class="form-container">
  <h2>تسجيل جديد</h2>
  <input id="name" type="text" placeholder="الاسم">
<input id="email" type="text" placeholder="الإيميل">
<input id="password" type="password" placeholder="كلمة المرور">
<button id="signupBtn">تسجيل</button>
</div>

<!-- مكتبات الخلفية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<!-- تشغيل الخلفية -->
<script>
VANTA.FOG({
  el: "#bg",
  highlightColor: 0xffffff,
  midtoneColor: 0xaaaaaa,
  lowlightColor: 0x000000,
  baseColor: 0x000000,
  blurFactor: 0.8,
  speed: 0.8
});
</script>
<!--serfr-->

<script type="module">
import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

document.getElementById("signupBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(window.auth, email, password);

   // 🔥 بعد التسجيل يوديه للرئيسية
    window.location.href = "index.html";

  } catch (error) {
    alert("خطأ: " + error.message);
  }

});
</script>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBpLuD26_WiVwhLKztyHH_W3FcTeHckEHM",
    authDomain: "web-koz.firebaseapp.com",
    databaseURL: "https://web-koz-default-rtdb.firebaseio.com",
    projectId: "web-koz",
    storageBucket: "web-koz.firebasestorage.app",
    messagingSenderId: "137112114880",
    appId: "1:137112114880:web:5cc6cf1e021a0c193d3f25",
    measurementId: "G-1TBHS0BS28"
  };

  const app = initializeApp(firebaseConfig);

  const auth = getAuth(app);
  const db = getFirestore(app);

 // 🔥 مهم جدًا عشان كل صفحاتك تستخدمه
  window.auth = auth;
  window.db = db;
</script>
</body>
</html>
